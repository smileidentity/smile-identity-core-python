name: Security Audit

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'poetry.lock'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: ${{ github.event_name != 'pull_request' && 'write' || 'none' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'
          cache: 'poetry'
      - name: Install pip-audit
        run: pip install pip-audit==2.9.0
      - name: Export requirements
        run: poetry export -f requirements.txt --with dev --without-hashes -o requirements-audit.txt
      - name: Run pip-audit
        run: pip-audit -r requirements-audit.txt
      - name: Create issue on failure
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "security-audit" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then exit 0; fi
          TITLE_DATE=$(date +%Y-%m-%d)
          gh label create "security-audit" --color "D93F0B" --description "Automated security audit finding" 2>/dev/null || true
          gh label create "priority:high" --color "B60205" --description "High priority" 2>/dev/null || true
          gh issue create \
            --title "Security: Python dependency vulnerabilities detected (${TITLE_DATE})" \
            --label "security-audit,priority:high" \
            --body "The daily security audit has detected vulnerabilities. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
